<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Input Validation</title>
    <link rel="stylesheet" href="main2.css" >
</head>
<body>
    <header>
        <h1>Input Validation</h1>
    </header>
    <main>
        <form>
            <!-- add div tags around each label/input combo so that they are on the line together; labels and inputs are inline elements; div is block -->
            <!-- this is the input for the first name -->
             <div>
            <label for="txtFirstName">First Name: </label>
            <input type="text" id="txtFirstName">
            </div>

            <!-- this is the input for the last name -->
             <div>
                <label for="txtLastName">Last Name: </label>
                <input type="text" id="txtLastName">
             </div>

             <div>
                <label for="txtZip">Zip Code: </label>
                <input type="text" id="txtZip">
             </div>

             <!-- use a button to validate the form, set the type to button so clicking does not submit the form -->
              <button type="button" onclick="validate();">Validate!</button>
        </form>
        <div id="secretMessage"></div>
    </main>
    <script src="strings.js"></script>
</body>
</html>
