<!-- Ctrl + ? will generate the code comment in VS Code for the type of code you are using 
 This is an html comment. it is a multi-line comment -->
 <!-- HTML is hypertext markup language; the line below specifies that this is an HTML5 webpage -->
 <!DOCTYPE html>
 <!-- Have an thml opening tag after the doctype is specified -->
<html lang="en">
<!-- head section - this is primarily for browsers and search engines -->
<head> <!-- opening tag -->
    <!-- this means that pretty much any character from any language may appear in this page -->
    <meta charset="UTF-8">
    <!-- this is the first step you should take in having a mobile-friendly design -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- short, sweet and descriptive titles -->
    <title>CSC102 Home Page</title>
</head>
<!-- All of our page contents goes between the opening and closing body tags -->
<body>
    <!-- header is a semantic HTML tag -->
    <!-- header - typically has a logo and/or menu -->
    <header>
        <!-- h1 is Heading 1, the page title. -->
        <h1>Welcome to CSC102 landing page</h1>
    </header>

    <div>
        <p>
            <img id="memeImage"
            src="g3sdt1soji2a1.jpg" width="300">
        </p>
    </div>
</body>
<!-- the closing HTML tag should be at the very end of the file -->
</html> <!-- closing tag -->
