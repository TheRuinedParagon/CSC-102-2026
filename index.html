    <h3> Functions </h3>

    <script>
        /* let's talk about functions - functions are a way to organize chunks of code; functions also allow us to 
        write code 1 time and reuse it as many times as we need to */
        // When creatin ga function in Javascript, use the keyword function to let the interpreter know that you are creating a reusable chunk of code
        // We create a descriptive name for what our function will do; most o fhte time our function names should include a verb; start function names with a letter, you can use numbers and _
        // camelCase or snake_case for namign styles - use whichever one you want but stay consistent
        // After the function name, use parentheses ( ) whether or not you are passing values into the function
        // the function code must be placed within curly braces { }
        function addNumbers(){
            // create 2 variables so we can add them together
            let number1 = 5; // we are hard-coding the value of 5 here
            let number2 = "eight";

            // create another variable to hold the sum
            let sum = number1 + number2;

            // let's write out the sum to the console
            // to concatenate (add text together), you can use + or ,
            console.log("the sum is: " + sum)
        }

        //shit line of code, calls the function so that we can test it
        addNumbers();
    </script>
